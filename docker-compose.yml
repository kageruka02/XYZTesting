version: "3.8"

# ============================================================
# XYZ Bank Test Automation — Docker Compose
# ============================================================
# Option A (default): run tests in a single standalone Chrome container.
# Option B: uncomment the grid services to run against Selenium Grid.
#
# Usage:
#   docker-compose up --build           # standalone mode
#   docker-compose up --build --scale   # (not needed for standalone)
# ============================================================

services:

  # ── Option A: Standalone (all-in-one) ───────────────────────────────────────
  xyz-tests-standalone:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xyz-tests
    environment:
      - headless=true
      - browser=chrome
    volumes:
      # Mount target/ so reports/screenshots are accessible on the host
      - ./target:/app/target
    shm_size: "2gb"          # prevents Chrome from crashing in containers

  # ── Option B: Selenium Grid ──────────────────────────────────────────────────
  # Uncomment to use a Grid topology instead of the standalone image.

