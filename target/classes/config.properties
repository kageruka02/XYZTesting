# ============================================================
# XYZ Bank Test Automation Framework - Configuration
# ============================================================

# Application URL
base.url=https://www.globalsqa.com/angularJs-protractor/BankingProject/#/login

# Browser: chrome | firefox | edge
browser=chrome

# Run in headless mode: true | false
headless=false

# Explicit wait timeout (seconds)
explicit.wait=15

# Page load timeout (seconds)
page.load.timeout=30

# Screenshot on failure: true | false
screenshot.on.failure=true

# Screenshots output directory
screenshot.dir=target/screenshots

# Allure results directory
allure.results.dir=target/allure-results
